      <stop offset="100%" stop-color="#4FC3F7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowOrange" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1510 430) rotate(90) scale(260 460)">
      <stop offset="0%" stop-color="#FF8A3D" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FF8A3D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="streamBlue" x1="880" y1="410" x2="1920" y2="270">
