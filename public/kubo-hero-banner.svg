    <filter id="blur24"><feGaussianBlur stdDeviation="24"/></filter>
    <filter id="blur12"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
